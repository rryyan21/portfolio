<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail - Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .project-detail {
        padding: 5rem 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .back-button:hover {
        transform: translateX(-5px);
      }

      .project-header {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        margin-bottom: 3rem;
      }

      .project-media {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .project-media img {
        width: 100%;
        height: auto;
        display: block;
      }

      .project-info {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .project-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .project-tags span {
        background-color: var(--light-background);
        padding: 0.3rem 0.8rem;
        border-radius: 15px;
        font-size: 0.8rem;
      }

      .project-content {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 3rem;
      }

      .project-description {
        line-height: 1.8;
      }

      .project-features {
        background-color: var(--light-background);
        padding: 2rem;
        border-radius: 10px;
      }

      .project-features h3 {
        margin-bottom: 1rem;
        color: var(--primary-color);
      }

      .project-features ul {
        list-style: none;
      }

      .project-features li {
        margin-bottom: 0.5rem;
        padding-left: 1rem;
        position: relative;
      }

      .project-features li:before {
        content: "•";
        color: var(--primary-color);
        position: absolute;
        left: 0;
      }

      @media (max-width: 768px) {
        .project-header {
          grid-template-columns: 1fr;
        }

        .project-content {
          grid-template-columns: 1fr;
        }
      }

      .additional-details {
        margin-top: 3rem;
        padding-top: 2rem;
        border-top: 1px solid var(--light-background);
      }

      .details-section {
        margin-bottom: 2rem;
      }

      .details-section h2 {
        color: var(--primary-color);
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }

      .details-section p {
        line-height: 1.6;
        margin-bottom: 1rem;
      }

      .details-section ul {
        list-style: none;
        padding-left: 1rem;
      }

      .details-section li {
        margin-bottom: 0.5rem;
        padding-left: 1rem;
        position: relative;
      }

      .details-section li:before {
        content: "•";
        color: var(--primary-color);
        position: absolute;
        left: 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Portfolio</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#projects">Projects</a>
        <a href="index.html#contact">Contact</a>
      </div>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>

    <main class="project-detail">
      <div class="project-header">
        <h1 id="project-title">Project Title</h1>
        <div class="project-meta">
          <span id="project-category">Web Development</span>
          <span id="project-year">2024</span>
        </div>
      </div>

      <div class="project-content">
        <div class="project-media">
          <img id="project-image" src="" alt="Project Screenshot" />
          <div class="project-demo">
            <video id="project-video" controls>
              <source src="" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>
        </div>

        <div class="project-info">
          <h2>About the Project</h2>
          <div class="project-description">
            <p id="project-description">Loading project description...</p>
          </div>

          <div class="technologies">
            <h3>Technologies Used</h3>
            <div id="tech-tags" class="tech-tags">
              <!-- Technologies will be added dynamically -->
            </div>
          </div>

          <div class="project-links">
            <a id="github-link" href="#" target="_blank">
              <i class="fab fa-github"></i>
              View Code
            </a>
            <a id="demo-link" href="#" target="_blank">
              <i class="fas fa-external-link-alt"></i>
              Live Demo
            </a>
          </div>
        </div>
      </div>

      <!-- Additional Project Details Section -->
      <div class="additional-details" id="additional-details">
        <!-- Content will be added dynamically -->
      </div>
    </main>

    <footer>
      <div class="social-links">
        <a href="https://github.com/rryyan21" target="_blank"
          ><i class="fab fa-github"></i
        ></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
      </div>
      <p>&copy; 2024 Ryan. All rights reserved.</p>
    </footer>

    <script>
      // Project data
      const projects = {
        project1: {
          title: "Janky Hollow Knight",
          category: "Game Development",
          year: "2024",
          image: "assets/images/Project1.jpg",
          video: "assets/images/Project1Demo.mp4",
          description:
            "For the final project in my ICS4U1 course, I was provided with a template of a basic, unfinished Zelda game and tasked with creating something new using it. The project was designed to help me learn how to navigate unfamiliar documentation and work in a new IDE—Greenfoot—which none of us had used before. This experience taught me how to efficiently learn a new programming language while allowing for a significant amount of creative freedom. It was a great opportunity to develop my problem-solving skills and explore new aspects of game development.",
          technologies: ["Greenfoot", "Java", "Javascript"],
          github: "https://github.com/rryyan21",
          demo: "#",
          additionalDetails: {
            features: [
              "Custom character movement and physics system",
              "Enemy AI with different behavior patterns",
              "Health and damage system",
              "Collectible items and power-ups",
              "Level design and progression",
            ],
            challenges: [
              "Learning Greenfoot and its documentation",
              "Implementing smooth character movement",
              "Creating balanced enemy AI",
              "Designing engaging level layouts",
            ],
            achievements: [
              "Successfully completed the project within the deadline",
              "Created a fully playable game with multiple levels",
              "Implemented complex game mechanics from scratch",
              "Received positive feedback from peers and instructors",
            ],
          },
        },
        project2: {
          title: "AI Tic Tac Toe",
          category: "Web Development",
          year: "2024",
          image: "assets/images/Project2.jpg",
          video: "assets/images/Project2Demo.mp4",
          description:
            "I created an online game of Tic Tac Toe where you are able to play against an AI with an algorithm I created. It is kind of impossible to beat the AI.",
          technologies: ["Python", "HTML", "Javascript"],
          github: "https://github.com/rryyan21",
          demo: "#",
          additionalDetails: {
            features: [
              "Interactive Tic Tac Toe game interface",
              "Custom AI algorithm for unbeatable gameplay",
              "Real-time game state management",
              "User-friendly interface",
              "Responsive design for all devices",
            ],
            challenges: [
              "Developing an unbeatable AI algorithm",
              "Implementing real-time game logic",
              "Creating an intuitive user interface",
              "Ensuring cross-browser compatibility",
            ],
            achievements: [
              "Successfully created an unbeatable AI opponent",
              "Developed a fully functional online game",
              "Implemented complex game logic and state management",
              "Created an engaging user experience",
            ],
          },
        },
        project3: {
          title: "W.A.I.L.A. - Automated Bus Safety System",
          category: "Engineering",
          year: "2024",
          image: "assets/images/project3.jpg",
          video: "assets/images/Project3Demo.mp4",
          description: `Developed a hands‑free deterrent for Michigan’s Blue Bus: a Python/OpenCV vision pipeline on an Arduino system that detects yellow‑line crossings and gently triggers a servo‑powered water gun. The result is a low‑latency, weather‑resistant solution that enforces safety without driver intervention.`,
          technologies: ["Python", "OpenCV", "Arduino", "Computer Vision"],
          github: "https://github.com/rryyan21",
          demo: "#",
          additionalDetails: {
            features: [
              "Real-time computer vision pipeline for line detection",
              "Automated water-gun actuator system",
              "Weather-resistant hardware enclosure",
              "Low-latency processing for immediate response",
              "Driver-independent operation",
            ],
            challenges: [
              "Calibrating line-detection thresholds for varying light conditions",
              "Integrating multiple hardware components (camera, Arduino, servo)",
              "Designing a weather-resistant enclosure",
              "Optimizing system latency for real-time response",
              "Ensuring reliable operation in different environments",
            ],
            achievements: [
              "Successfully implemented a working prototype",
              "Created a hands-free, automated safety system",
              "Demonstrated practical application of computer vision",
              "Received positive feedback from engineering faculty",
              "Showcased innovative solution to a real-world problem",
            ],
          },
        },
      };

      // Get project ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get("id");

      // Load project data
      if (projectId && projects[projectId]) {
        const project = projects[projectId];

        // Update page title
        document.title = `${project.title} | Portfolio`;

        // Update project details
        document.getElementById("project-title").textContent = project.title;
        document.getElementById("project-category").textContent =
          project.category;
        document.getElementById("project-year").textContent = project.year;
        document.getElementById("project-image").src = project.image;
        document.getElementById("project-video").src = project.video;
        document.getElementById("project-description").textContent =
          project.description;
        document.getElementById("github-link").href = project.github;
        document.getElementById("demo-link").href = project.demo;

        // Add technologies
        const techTagsContainer = document.getElementById("tech-tags");
        project.technologies.forEach((tech) => {
          const span = document.createElement("span");
          span.textContent = tech;
          techTagsContainer.appendChild(span);
        });

        // Add additional details if they exist
        if (project.additionalDetails) {
          const detailsContainer =
            document.getElementById("additional-details");
          detailsContainer.innerHTML = `
            <div class="details-section">
            <div class="details-section">
              <h2>Key Features</h2>
              <ul>
                ${project.additionalDetails.features
                  .map((feature) => `<li>${feature}</li>`)
                  .join("")}
              </ul>
            </div>
            <div class="details-section">
              <h2>Challenges Faced</h2>
              <ul>
                ${project.additionalDetails.challenges
                  .map((challenge) => `<li>${challenge}</li>`)
                  .join("")}
              </ul>
            </div>
            <div class="details-section">
              <h2>Achievements</h2>
              <ul>
                ${project.additionalDetails.achievements
                  .map((achievement) => `<li>${achievement}</li>`)
                  .join("")}
              </ul>
            </div>
          `;
        }
      } else {
        // Handle invalid project ID
        document.getElementById("project-title").textContent =
          "Project Not Found";
        document.getElementById("project-description").textContent =
          "The requested project could not be found.";
      }
    </script>
  </body>
</html>
